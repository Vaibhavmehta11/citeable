<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Citeable</title>
<style>
body{font-family:Inter,system-ui,sans-serif;margin:0;background:#f8fafc;color:#111827;padding:48px 24px}
.wrap{max-width:860px;margin:0 auto}
h1{font-size:32px;line-height:1.1;margin:0 0 12px;color:#0f1f3d}
p{color:#6b7280;font-size:15px;margin:0 0 24px}
.grid{display:grid;gap:14px}
a{display:block;padding:18px 20px;border-radius:16px;background:#fff;border:1px solid #e5e7eb;box-shadow:0 14px 36px rgba(15,31,61,.08);text-decoration:none;color:#0f1f3d;font-weight:800}
a span{display:block;font-weight:500;color:#6b7280;font-size:14px;margin-top:4px}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrap">
  <h1>Citeable private audit links</h1>
  <p>Premium audit pages prepared for March 2026 outreach.</p>
  <div class="grid">
    <a href="./audit/bwd/">Bloor West Dental<span>Original premium audit reference</span></a>
    <a href="./audit/altima/">Altima Dental<span>Multi-location Ontario dental group</span></a>
    <a href="./audit/diamond/">Diamond &amp; Diamond Lawyers<span>Toronto personal injury law firm</span></a>
    <a href="./audit/junk/">1-800-GOT-JUNK? Canada<span>Nationwide junk removal brand</span></a>
  </div>
</div>
</body>
</html>
